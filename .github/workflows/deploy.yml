name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ahamea/frontend:${{ github.sha }} .
          docker tag ahamea/frontend:${{ github.sha }} ahamea/frontend:latest

      - name: Push Docker Images
        run: |
          docker push ahamea/frontend:${{ github.sha }}
          docker push ahamea/frontend:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Pull Latest Docker Image
        run: |
          sudo docker pull ahamea/frontend:latest

      - name: Stop Existing Container
        run: |
          sudo docker stop frontend-container || true
          sudo docker rm frontend-container || true

      - name: Run New Container
        run: |
          sudo docker run -d \
            --name frontend-container \
            -p 80:80 \
            --restart always \
            ahamea/frontend:latest
